<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Weather</title>
  <link rel="stylesheet" href="/dynamic/frame-prefs.css">
  <link rel="stylesheet" href="./index.css">
</head>
<body class="ch2">
  <header class="page-header">
    <div class="title">
      <i class="ph-light ph-storefront icon-md"></i>
      <h1>Market Weather</h1>
    </div>
    <div class="header-actions">
      <span id="weather-chip" class="weather-chip hidden"></span>
      <button id="settings-btn" class="ghost" title="Settings">
        <i class="ph-light ph-gear icon-sm"></i>
      </button>
    </div>
  </header>

  <p id="setup-note" class="muted note hidden">
    <i class="ph-light ph-info icon-sm"></i>
    <span id="setup-text">Open settings to set your market's location.</span>
  </p>

  <section id="chart-section" class="chart-section hidden">
    <div class="chart-wrap">
      <canvas id="chart" width="800" height="320"></canvas>
      <div id="tooltip" class="tooltip hidden"></div>
    </div>
    <div class="legend">
      <span class="legend-chip"><span class="swatch swatch--turnout"></span>turnout</span>
      <span class="legend-chip"><span class="swatch swatch--peak"></span>peak window</span>
      <span class="legend-chip"><span class="swatch swatch--day"></span>day</span>
      <span class="legend-chip"><span class="swatch swatch--night"></span>night</span>
      <span class="legend-chip"><span class="swatch swatch--rain"></span>rain</span>
      <span class="legend-chip"><span class="swatch swatch--extreme"></span>heat/cold</span>
      <span class="legend-chip"><span class="swatch swatch--weekend"></span>weekend</span>
      <span class="legend-chip"><span class="swatch swatch--temp"></span>temp comfort</span>
      <span class="legend-chip"><span class="swatch swatch--seasonal"></span>seasonal pleasantness</span>
    </div>
  </section>

  <section id="peaks" class="peaks hidden"></section>

  <!-- Settings dialog -->
  <div id="settings-overlay" class="overlay hidden">
    <div class="surface dialog">
      <header class="dialog-header">
        <h2>Market settings</h2>
        <button id="settings-close" class="ghost" title="Close">
          <i class="ph-light ph-x icon-sm"></i>
        </button>
      </header>

      <label class="field">
        <span>Market location (city, region, or zip)</span>
        <input id="cfg-location" type="text" maxlength="120" placeholder="e.g. 97214 or Portland, Oregon">
        <span class="muted hint">Used only to fetch weather from open-meteo.com.</span>
      </label>

      <div class="dialog-actions">
        <button id="settings-cancel" class="ghost">cancel</button>
        <button id="settings-save">save</button>
      </div>
    </div>
  </div>

  <script src="./index.js"></script>
</body>
</html>
